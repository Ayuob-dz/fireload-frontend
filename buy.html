<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شراء ألماس - Fire Load</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar (مثل dashboard) -->
            <div class="col-md-3 col-lg-2 px-0 sidebar" style="background:#1a1a2e; min-height:100vh;">
                <div class="p-3 text-white">
                    <h3>🔥 Fire Load</h3>
                    <hr>
                    <a href="dashboard.html" class="text-white d-block p-2">لوحة التحكم</a>
                    <a href="profile.html" class="text-white d-block p-2">الملف الشخصي</a>
                    <a href="wallet.html" class="text-white d-block p-2">محفظتي</a>
                    <a href="buy.html" class="text-white d-block p-2 active">شراء ألماس</a>
                    <a href="orders.html" class="text-white d-block p-2">طلباتي</a>
                    <a href="#" onclick="logout()" class="text-white d-block p-2">تسجيل الخروج</a>
                </div>
            </div>
            <!-- Main content -->
            <div class="col-md-9 col-lg-10 p-4">
                <h2>شراء ألماس</h2>
                <div class="row">
                    <div class="col-md-8">
                        <div id="error" class="alert alert-danger" style="display: none;"></div>
                        <div id="success" class="alert alert-success" style="display: none;"></div>
                        
                        <div class="row" id="packagesContainer"></div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body">
                                <h5>رصيدك الحالي</h5>
                                <h3 id="walletBalance">$0.00</h3>
                                <a href="wallet.html" class="btn btn-sm btn-primary">شحن المحفظة</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for confirmation -->
    <div class="modal fade" id="buyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">تأكيد الشراء</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="modalPackageId">
                    <p>الباقة: <strong id="modalPackageName"></strong></p>
                    <p>السعر: <strong id="modalPrice"></strong> $</p>
                    <div class="mb-3">
                        <label>ID فري فاير الخاص بك</label>
                        <input type="text" id="modalPlayerId" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="confirmPurchase()">تأكيد الشراء</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentPackages = [];
        
        async function loadPackages() {
            const response = await fetch(API_BASE + '/packages');
            const packages = await response.json();
            currentPackages = packages;
            const container = document.getElementById('packagesContainer');
            container.innerHTML = '';
            packages.forEach(pkg => {
                container.innerHTML += `
                    <div class="col-md-4 mb-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5>${pkg.name}</h5>
                                <p>${pkg.description || ''}</p>
                                <h4 class="text-warning">$${pkg.price}</h4>
                                <button class="btn btn-primary" onclick="showBuyModal(${pkg.id}, '${pkg.name}', ${pkg.price})">شراء</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        async function loadWalletBalance() {
            const response = await fetchWithAuth(API_BASE + '/user/profile');
            if (response) {
                const user = await response.json();
                document.getElementById('walletBalance').innerText = `$${parseFloat(user.wallet_balance).toFixed(2)}`;
            }
        }
        
        function showBuyModal(id, name, price) {
            document.getElementById('modalPackageId').value = id;
            document.getElementById('modalPackageName').innerText = name;
            document.getElementById('modalPrice').innerText = price;
            // تعبئة ID اللاعب إذا كان مخزناً (يمكن جلبه من الـ profile)
            fetchWithAuth(API_BASE + '/user/profile').then(res => res.json()).then(user => {
                document.getElementById('modalPlayerId').value = user.freefire_id || '';
            });
            new bootstrap.Modal(document.getElementById('buyModal')).show();
        }
        
        async function confirmPurchase() {
            const packageId = document.getElementById('modalPackageId').value;
            const playerId = document.getElementById('modalPlayerId').value;
            if (!playerId) {
                alert('يرجى إدخال ID فري فاير');
                return;
            }
            
            const response = await fetchWithAuth(API_BASE + '/buy', {
                method: 'POST',
                body: JSON.stringify({ package_id: packageId, player_id: playerId })
            });
            
            const data = await response.json();
            if (response.ok) {
                document.getElementById('success').style.display = 'block';
                document.getElementById('success').innerText = data.message;
                setTimeout(() => { location.reload(); }, 2000);
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerText = data.message;
            }
            bootstrap.Modal.getInstance(document.getElementById('buyModal')).hide();
        }
        
        loadPackages();
        loadWalletBalance();
    </script>
</body>
</html>
