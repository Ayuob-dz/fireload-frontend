<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب - Fire Load</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px; }
        .register-card { background: white; border-radius: 20px; padding: 40px; max-width: 600px; margin: 20px auto; }
        .logo { text-align: center; font-size: 2rem; color: #ff7b00; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">🔥 Fire Load</div>
        <div id="error" class="alert alert-danger" style="display: none;"></div>
        <div id="success" class="alert alert-success" style="display: none;"></div>
        <form id="registerForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>الاسم الكامل</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="phone" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label>ID فري فاير (اختياري)</label>
                    <input type="text" id="freefire_id" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>تأكيد كلمة المرور</label>
                    <input type="password" id="confirm_password" class="form-control" required>
                </div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" id="agree" class="form-check-input" required>
                <label class="form-check-label">أوافق على <a href="terms.html">الشروط</a></label>
            </div>
            <button type="submit" class="btn btn-primary w-100">إنشاء الحساب</button>
        </form>
        <div class="mt-3 text-center">
            لديك حساب؟ <a href="login.html">تسجيل الدخول</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError('error');
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            if (password !== confirm) {
                showError('error', 'كلمة المرور غير متطابقة');
                return;
            }
            
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                freefire_id: document.getElementById('freefire_id').value,
                password: password
            };
            
            const response = await fetch(API_BASE + '/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });
            
            const data = await response.json();
            if (response.ok) {
                document.getElementById('success').style.display = 'block';
                document.getElementById('success').innerText = 'تم إنشاء الحساب بنجاح، يمكنك تسجيل الدخول الآن.';
                setTimeout(() => { window.location.href = 'login.html'; }, 3000);
            } else {
                showError('error', data.message || 'حدث خطأ');
            }
        });
    </script>
</body>
</html>
