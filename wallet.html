<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محفظتي - Fire Load</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar { background: #1a1a2e; min-height: 100vh; }
        .sidebar a { color: white; display: block; padding: 10px; }
        .sidebar a:hover { background: #ff7b00; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar (مثل dashboard) -->
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <div class="p-3 text-white">
                    <h3>🔥 Fire Load</h3>
                    <hr>
                    <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</a>
                    <a href="profile.html"><i class="fas fa-user"></i> الملف الشخصي</a>
                    <a href="wallet.html" class="active"><i class="fas fa-wallet"></i> محفظتي</a>
                    <a href="buy.html"><i class="fas fa-shopping-cart"></i> شراء ألماس</a>
                    <a href="orders.html"><i class="fas fa-history"></i> طلباتي</a>
                    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a>
                </div>
            </div>
            <!-- Main content -->
            <div class="col-md-9 col-lg-10 p-4">
                <h2>محفظتي</h2>
                <div class="card mb-4">
                    <div class="card-body">
                        <h4>الرصيد الحالي: <span id="walletBalance" class="text-success">$0.00</span></h4>
                        <a href="deposit.html" class="btn btn-primary">شحن المحفظة</a>
                    </div>
                </div>
                
                <h4>سجل الإيداعات</h4>
                <table class="table table-bordered" id="depositsTable">
                    <thead>
                        <tr><th>المبلغ</th><th>رقم العملية</th><th>الحالة</th><th>التاريخ</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
                
                <h4 class="mt-4">سجل عمليات الشراء</h4>
                <table class="table table-bordered" id="ordersTable">
                    <thead>
                        <tr><th>الباقة</th><th>المبلغ</th><th>الحالة</th><th>التاريخ</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        async function loadWallet() {
            // جلب بيانات المستخدم للرصيد
            const profileRes = await fetchWithAuth(API_BASE + '/user/profile');
            if (!profileRes) return;
            const user = await profileRes.json();
            document.getElementById('walletBalance').innerText = `$${parseFloat(user.wallet_balance).toFixed(2)}`;
            
            // جلب سجل الإيداعات
            const depositsRes = await fetchWithAuth(API_BASE + '/user/deposits');
            if (depositsRes) {
                const deposits = await depositsRes.json();
                const tbody = document.querySelector('#depositsTable tbody');
                tbody.innerHTML = '';
                deposits.forEach(dep => {
                    tbody.innerHTML += `<tr>
                        <td>$${dep.amount}</td>
                        <td>${dep.transaction_id || '-'}</td>
                        <td><span class="badge bg-${dep.status=='pending'?'warning':(dep.status=='approved'?'success':'danger')}">${dep.status}</span></td>
                        <td>${new Date(dep.created_at).toLocaleString('ar')}</td>
                    </tr>`;
                });
            }
            
            // جلب سجل الطلبات
            const ordersRes = await fetchWithAuth(API_BASE + '/user/orders');
            if (ordersRes) {
                const orders = await ordersRes.json();
                const tbody = document.querySelector('#ordersTable tbody');
                tbody.innerHTML = '';
                orders.forEach(ord => {
                    tbody.innerHTML += `<tr>
                        <td>${ord.package_name}</td>
                        <td>$${ord.amount}</td>
                        <td><span class="badge bg-${ord.status=='pending'?'warning':(ord.status=='completed'?'success':'danger')}">${ord.status}</span></td>
                        <td>${new Date(ord.created_at).toLocaleString('ar')}</td>
                    </tr>`;
                });
            }
        }
        loadWallet();
    </script>
</body>
</html>
