<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شحن المحفظة - Fire Load</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>شحن المحفظة عبر Binance</h2>
        <div class="card p-4">
            <p>حساب Binance الثابت: <strong id="binanceId">123456789</strong> <button class="btn btn-sm btn-secondary" onclick="copyToClipboard()">نسخ</button></p>
            <p>يرجى تحويل المبلغ المطلوب إلى هذا الحساب ثم تعبئة النموذج أدناه مع إرفاق لقطة شاشة للعملية.</p>
            
            <div id="error" class="alert alert-danger" style="display: none;"></div>
            <div id="success" class="alert alert-success" style="display: none;"></div>
            
            <form id="depositForm" enctype="multipart/form-data">
                <div class="mb-3">
                    <label>المبلغ ($)</label>
                    <input type="number" step="0.01" id="amount" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>رقم العملية (Transaction ID)</label>
                    <input type="text" id="transaction_id" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>لقطة شاشة للعملية</label>
                    <input type="file" id="screenshot" class="form-control" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary">إرسال الطلب</button>
                <a href="wallet.html" class="btn btn-secondary">رجوع</a>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function copyToClipboard() {
            const id = document.getElementById('binanceId').innerText;
            navigator.clipboard.writeText(id).then(() => alert('تم النسخ'));
        }

        document.getElementById('depositForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError('error');
            
            const formData = new FormData();
            formData.append('amount', document.getElementById('amount').value);
            formData.append('transaction_id', document.getElementById('transaction_id').value);
            formData.append('screenshot', document.getElementById('screenshot').files[0]);
            
            const token = getToken();
            const response = await fetch(API_BASE + '/deposit', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            
            const data = await response.json();
            if (response.ok) {
                document.getElementById('success').style.display = 'block';
                document.getElementById('success').innerText = data.message;
                setTimeout(() => { window.location.href = 'wallet.html'; }, 2000);
            } else {
                showError('error', data.message || 'حدث خطأ');
            }
        });
    </script>
</body>
</html>
